services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DB_PATH=/data/news.db
    volumes:
      - news_db:/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
  news_db:
